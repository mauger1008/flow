<!DOCTYPE html>
<html lang="es" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Video Unlock</title>
    <!-- CSS de Bootstrap 5 -->
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <link rel="icon" type="image/png" sizes="32x32" href="img/logo-andres.jpeg">
     <!-- Iconos de Bootstrap --> 
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <link rel="stylesheet" href="css/estilo.css">
    </head>
<body class="d-flex flex-column h-100">

    <!-- Contenido Principal -->
    <main class="flex-shrink-0 container my-auto py-5 px-4 text-center">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                
                <!-- Título Principal -->
                <h1 class="display-4 mb-3 titulo-1">
                    Descubre el Secreto del Éxito Comercial
                </h1>
                
                <!-- Subtítulo -->
                <p class="lead text-secondary mb-5 fs-5">
                    Mira el siguiente video completo para desbloquear tu acceso exclusivo al checkout.
                </p>

                <!-- Contenedor del Video (Usando la clase Ratio nativa de Bootstrap 5) -->
                <div class="ratio ratio-16x9 rounded-3 shadow-lg mb-5">
                    <!-- El script de YouTube reemplazará este div automáticamente -->
                    <iframe width="560" height="315" src="https://www.youtube.com/watch?v=aqxpcRod_9k" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                    <div id="player"></div>
                </div>

                <!-- Botón de Checkout (Inicialmente Deshabilitado) -->
                <div class="row justify-content-center">
                    <div class="col-12 col-sm-8 col-md-6 col-lg-5">
                        <a id="checkout-btn" href="https://tu-link-de-checkout.com" class="btn btn-success btn-lg w-100 py-3 fw-bold shadow-sm disabled" role="button" aria-disabled="true">
                            <i class="bi bi-cart-fill me-2"></i>Ir al Checkout
                        </a>
                        <small id="btn-hint" class="text-muted d-block mt-3 fst-italic">
                            <p>El botón se activará automáticamente al finalizar el video.</p>
                        </small>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Pie de Página Editable -->
    <footer class="footer mt-auto py-4 bg-dark text-white border-top border-secondary">
        <div class="container text-center">
            <p class="mb-3 text-secondary small">&copy; 2026 Tu Empresa. Todos los derechos reservados.</p>
            
            <!-- Redes Sociales -->
            <div class="d-flex justify-content-center gap-4 fs-3">
                <a href="https://facebook.com" class="text-white link-primary transition" target="_blank" rel="noopener" aria-label="Facebook">
                    <i class="bi bi-facebook"></i>
                </a>
                <a href="https://instagram.com" class="text-white link-danger transition" target="_blank" rel="noopener" aria-label="Instagram">
                    <i class="bi bi-instagram"></i>
                </a>
                <a href="https://twitter.com" class="text-white link-info transition" target="_blank" rel="noopener" aria-label="Twitter X">
                    <i class="bi bi-twitter-x"></i>
                </a>
                <a href="https://youtube.com" class="text-white link-danger transition" target="_blank" rel="noopener" aria-label="YouTube">
                    <i class="bi bi-youtube"></i>
                </a>
            </div>
        </div>
    </footer>

    <!-- JS de Bootstrap -->
    <script src="https://jsdelivr.net"></script>

    <!-- Lógica de la API de YouTube -->
    <script>
        var tag = document.createElement('script');
        tag.src = "https://youtube.com";
        var firstScriptTag = document.getElementsByTagName('script');
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'dQw4w9WgXcQ', // REEMPLAZA ESTE ID por el de tu video
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                var checkoutBtn = document.getElementById('checkout-btn');
                var btnHint = document.getElementById('btn-hint');
                
                // Activa el botón quitando clases de Bootstrap
                checkoutBtn.classList.remove('disabled');
                checkoutBtn.removeAttribute('aria-disabled');
                
                // Cambia el color del texto informativo con utilidades de color
                btnHint.textContent = "¡Acceso desbloqueado con éxito!";
                btnHint.classList.replace('text-muted', 'text-success');
                btnHint.classList.add('fw-bold');
            }
        }
    </script>
</body>
</html>
